appId: com.pi.coding-agent
productName: Pi Coding Agent
# Skip native module rebuild — pnpm workspace compat.
npmRebuild: false

directories:
  buildResources: build
  output: release

# App icon (512x512 PNG). electron-builder auto-converts to .icns (macOS) and .ico (Windows).
icon: build/icon.png

# Let electron-builder auto-detect production dependencies from package.json.
# We only need to include the electron-vite output; electron-builder will pull in the
# necessary node_modules based on the "dependencies" field.
files:
  - out/**/*

# Native .node addons inside @earendil-works/pi-coding-agent must be unpacked
# from the asar archive so they can be loaded by Node at runtime.
asarUnpack:
  - "node_modules/@earendil-works/pi-coding-agent/**/*"
  - "node_modules/@mariozechner/clipboard*/**/*"

# Bundled skills (officecli, skill-creator, etc.) shipped as extraResources
# so users get them out of the box without installing via CLI.
extraResources:
  - from: "skills/"
    to: "skills/"

mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  # Code signing: requires Apple Developer account.
  # Uncomment and set these when you have a signing identity:
  # hardenedRuntime: true
  # gatekeeperAssess: false
  # entitlements: build/entitlements.mac.plist
  # entitlementsInherit: build/entitlements.mac.plist

win:
  # Bundle MinGit BusyBox (shell + git + coreutils) so Windows users
  # get bash-like command execution out of the box.
  # Note: platform-level extraResources override the top-level list,
  # so bundled skills must be repeated here.
  extraResources:
    - from: "skills/"
      to: "skills/"
    - from: "bash-bundle/"
      to: "bash-bundle/"
  target:
    - target: nsis
      arch:
        - x64
        - arm64
  # Code signing for Windows (requires certificate):
  # certificateFile: build/cert.pfx
  # certificatePassword: ${CERT_PASSWORD}

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

linux:
  target:
    - AppImage
    - deb
  category: Development
  maintainer: pi@example.com
